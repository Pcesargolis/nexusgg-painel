<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NexusGG Painel</title>

<style>

body{
    background:#0f1115;
    font-family:Arial;
    color:white;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    font-size:30px;
    margin-bottom:20px;
}

.card{
    background:#1a1d24;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
}

.meta{
    font-size:20px;
    color:#ffd700;
}

input{
    padding:10px;
    border:none;
    border-radius:6px;
    margin-right:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#ffd700;
    cursor:pointer;
}

.member{
    background:#1a1d24;
    padding:15px;
    border-radius:8px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
NexusGG Painel de Farm
</div>

<div class="card">
<div id="metaAtual" class="meta">Meta: carregando...</div>

<br>

<input id="novaMeta" placeholder="Nova meta dinheiro">

<button onclick="alterarMeta()">
Alterar Meta
</button>
</div>

<div class="card">
<div id="totalSujo">Total farmado: carregando...</div>
</div>

<div id="members"></div>

</div>

<script>

const API_BASE = window.location.origin;

async function carregar(){

const res = await fetch(API_BASE + "/api/farm");
const json = await res.json();

let farm = json.farm || {};
let meta = json.meta || {};

document.getElementById("metaAtual").innerText =
"Meta atual: R$ " + meta.dinheiroSujo.toLocaleString("pt-BR");

let total = 0;
let html = "";

Object.values(farm).forEach(p=>{

total += p.sujo || 0;

html += `
<div class="member">
<b>${p.nome}</b><br>
Sujo: R$ ${(p.sujo||0).toLocaleString("pt-BR")}<br>
Componentes: ${p.comp || 0}
</div>
`;

});

document.getElementById("members").innerHTML = html;

document.getElementById("totalSujo").innerText =
"Total farmado: R$ " + total.toLocaleString("pt-BR");

}

async function alterarMeta(){

let valor = document.getElementById("novaMeta").value;

alert("Meta alterada (exemplo). Integração real depende do backend.");

}

carregar();

setInterval(carregar,5000);

</script>

</body>
</html>
